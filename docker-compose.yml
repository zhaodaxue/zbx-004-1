version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: darkroom-backend
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/app/prisma
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=http://localhost:5173
    networks:
      - darkroom-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: darkroom-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - darkroom-network

volumes:
  backend-data:

networks:
  darkroom-network:
    driver: bridge
